<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — FolioCraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="reset-password.css"/>
</head>
<body class="light">

  <div class="bg" aria-hidden="true">
    <div class="bg-orb bg-orb--a"></div>
    <div class="bg-orb bg-orb--b"></div>
    <div class="bg-grid"></div>
  </div>

  <div class="reset-wrap">
    <div class="reset-card">

      <div class="reset-logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="1.5">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#5b4de8"/>
              <stop offset="100%" stop-color="#0ba89a"/>
            </linearGradient>
          </defs>
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
      </div>

      <h1 class="reset-title">Reset Password</h1>
      <p class="reset-sub">Add New Password</p>

      <div class="reset-message" id="resetMessage" style="display:none"></div>

      <form id="resetForm">

        <div class="auth-field">
          <label>New Password</label>
          <div class="password-input-wrap">
            <input
              type="password"
              id="newPassword"
              placeholder="Min 6 characters"
              required
            />
            <button type="button" class="eye-btn" id="eyeBtn1" aria-label="Show password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="strength-wrap" id="strengthWrap" style="display:none">
            <div class="strength-bar">
              <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span class="strength-text" id="strengthText"></span>
          </div>
        </div>

        <div class="auth-field">
          <label>Confirm Password</label>
          <div class="password-input-wrap">
            <input
              type="password"
              id="confirmPassword"
              placeholder="Rewrite"
              required
            />
            <button type="button" class="eye-btn" id="eyeBtn2" aria-label="Show password">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="match-text" id="matchText"></span>
        </div>

        <button type="submit" class="auth-submit" id="resetSubmit">
          Reset Password
        </button>

      </form>

      <a href="index.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to Login
      </a>

    </div>
  </div>

  <script src="api.js"></script>
  <script>
  (function() {

    const THEME_KEY = 'fc_theme';
    const saved = localStorage.getItem(THEME_KEY);
    if (saved) { document.body.classList.remove('light','dark'); document.body.classList.add(saved); }

    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      showMessage('Invalid reset link. Try forget password again.', 'error');
      document.getElementById('resetForm').style.display = 'none';
    }

    // ── Show/Hide Password ──
    const eyeOpen = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>`;

    const eyeClosed = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
      <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>`;

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (!input) return;
      const isHidden = input.type === 'password';
      input.type   = isHidden ? 'text' : 'password';
      btn.innerHTML = isHidden ? eyeClosed : eyeOpen;
    }

    document.getElementById('eyeBtn1')?.addEventListener('click', function() {
      togglePassword('newPassword', this);
    });

    document.getElementById('eyeBtn2')?.addEventListener('click', function() {
      togglePassword('confirmPassword', this);
    });

    // ── Password Strength ──
    document.getElementById('newPassword')?.addEventListener('input', function() {
      const val  = this.value;
      const wrap = document.getElementById('strengthWrap');
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');

      if (!val) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'flex';

      let score = 0;
      if (val.length >= 6)           score++;
      if (val.length >= 10)          score++;
      if (/[A-Z]/.test(val))         score++;
      if (/[0-9]/.test(val))         score++;
      if (/[^A-Za-z0-9]/.test(val))  score++;

      const levels = [
        { label: 'Very weak', color: '#ef4444', width: '20%'  },
        { label: 'Weak',       color: '#f97316', width: '40%'  },
        { label: 'Good',    color: '#eab308', width: '60%'  },
        { label: 'Strong',         color: '#22c55e', width: '80%'  },
        { label: 'Very Strong',   color: '#16a34a', width: '100%' },
      ];

      const level           = levels[Math.min(score, 4)];
      fill.style.width      = level.width;
      fill.style.background = level.color;
      text.textContent      = level.label;
      text.style.color      = level.color;
    });

    // ── Password Match ──
    document.getElementById('confirmPassword')?.addEventListener('input', function() {
      const pass1 = document.getElementById('newPassword').value;
      const pass2 = this.value;
      const text  = document.getElementById('matchText');

      if (!pass2) { text.textContent = ''; return; }

      if (pass1 === pass2) {
        text.textContent = '✓ Password matched';
        text.style.color = '#22c55e';
      } else {
        text.textContent = '✗ Password does not match.';
        text.style.color = '#ef4444';
      }
    });

    // ── Form Submit ──
    document.getElementById('resetForm')?.addEventListener('submit', async function(e) {
      e.preventDefault();

      const newPass  = document.getElementById('newPassword').value;
      const confPass = document.getElementById('confirmPassword').value;
      const btn      = document.getElementById('resetSubmit');

      if (newPass !== confPass) {
        showMessage('Password does not match!', 'error');
        return;
      }

      if (newPass.length < 6) {
        showMessage('Password must be minimum of 6 characters.', 'error');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Resetting...';

      try {
        const res = await fetch(
  'https://folio-craft-two.vercel.app/api/auth/reset-password',
  {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, newPassword: newPass })
  }
);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        showMessage(data.message, 'success');
        document.getElementById('resetForm').style.display = 'none';
        setTimeout(() => { window.location.href = 'index.html'; }, 2500);

      } catch(err) {
        showMessage(err.message, 'error');
        btn.disabled    = false;
        btn.textContent = 'Reset Password';
      }
    });

    function showMessage(msg, type) {
      const el = document.getElementById('resetMessage');
      el.textContent   = msg;
      el.className     = 'reset-message ' + type;
      el.style.display = 'block';
    }

  })();
  </script>

</body>
</html>
