<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{width:1200px;height:630px;background:#080c18;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;overflow:hidden}
    .wrap{text-align:center;padding:60px}
    .badge{display:inline-block;padding:8px 20px;border-radius:999px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);font-size:14px;color:rgba(255,255,255,.6);letter-spacing:.08em;text-transform:uppercase;margin-bottom:28px}
    h1{font-size:72px;font-weight:800;letter-spacing:-.04em;line-height:1.05;color:#fff;margin-bottom:20px}
    .grad{background:linear-gradient(135deg,#7b6ef6,#34d1bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    p{font-size:22px;color:rgba(255,255,255,.5);line-height:1.6}
    .stats{display:flex;gap:32px;justify-content:center;margin-top:36px}
    .stat{text-align:center}
    .stat strong{display:block;font-size:28px;font-weight:800;background:linear-gradient(135deg,#7b6ef6,#34d1bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .stat span{font-size:13px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">Portfolio Builder · Final Year Project</div>
    <h1>Build Your<br><span class="grad">Digital Portfolio</span><br>in Minutes</h1>
    <p>No code needed. 10 templates. Download & deploy anywhere.</p>
    <div class="stats">
      <div class="stat"><strong>10</strong><span>Templates</span></div>
      <div class="stat"><strong>5 min</strong><span>To Finish</span></div>
      <div class="stat"><strong>100%</strong><span>Yours</span></div>
    </div>
  </div>
</body>
</html>
