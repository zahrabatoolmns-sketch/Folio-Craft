<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio</title>
  <style>
  :root {
    --bg:        #0b0f1a;
    --bg-glow-1: rgba(99,102,241,0.10);
    --bg-glow-2: rgba(6,182,212,0.07);
    --card:      rgba(15,20,35,0.95);
    --border:    rgba(255,255,255,0.09);
    --border-err:rgba(239,68,68,0.22);
    --text:      rgba(255,255,255,0.88);
    --muted:     rgba(255,255,255,0.40);
    --loader-txt:rgba(255,255,255,0.45);
    --spin-track:rgba(99,102,241,0.15);
    --spin-head: #6366f1;
    --err-bg:    rgba(239,68,68,0.10);
    --err-border:rgba(239,68,68,0.22);
    --inset:     inset 0 1px 0 rgba(255,255,255,0.05);
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg:        #f4f5f9;
      --bg-glow-1: rgba(99,102,241,0.07);
      --bg-glow-2: rgba(6,182,212,0.05);
      --card:      rgba(255,255,255,0.97);
      --border:    rgba(0,0,0,0.08);
      --border-err:rgba(239,68,68,0.25);
      --text:      rgba(15,20,35,0.90);
      --muted:     rgba(15,20,35,0.45);
      --loader-txt:rgba(15,20,35,0.45);
      --spin-track:rgba(99,102,241,0.12);
      --spin-head: #6366f1;
      --err-bg:    rgba(239,68,68,0.06);
      --err-border:rgba(239,68,68,0.20);
      --inset:     inset 0 1px 0 rgba(255,255,255,0.80);
    }
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background:
      radial-gradient(900px 600px at 15% 10%, var(--bg-glow-1), transparent 60%),
      radial-gradient(700px 500px at 85% 80%, var(--bg-glow-2), transparent 55%),
      var(--bg);
    display:flex; align-items:center; justify-content:center;
    min-height:100vh;
    font-family:ui-sans-serif,system-ui,sans-serif;
    transition:background 0.3s ease;
  }

  .loader {
    text-align:center;
    color:var(--loader-txt);
    font-size:13px;
    letter-spacing:0.01em;
  }

  .spinner {
    width:40px; height:40px;
    border:2.5px solid var(--spin-track);
    border-top-color:var(--spin-head);
    border-radius:50%;
    animation:spin 0.75s linear infinite;
    margin:0 auto 14px;
  }

  @keyframes spin { to { transform:rotate(360deg); } }

  .error {
    max-width:320px;
    text-align:center;
    padding:28px 24px;
    background:var(--card);
    border:1px solid var(--border-err);
    border-radius:18px;
    box-shadow:0 24px 48px rgba(0,0,0,0.15), var(--inset);
  }

  .error-icon {
    width:44px; height:44px;
    background:var(--err-bg);
    border:1px solid var(--err-border);
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 14px;
  }

  .error-title {
    font-size:14px; font-weight:700;
    color:var(--text);
    margin-bottom:6px;
    letter-spacing:-0.01em;
  }

  .error-msg {
    font-size:12.5px; line-height:1.65;
    color:var(--muted);
  }

  #portfolioFrame {
    display:none;
    position:fixed;
    inset:0;
    width:100%; height:100%;
    border:none;
  }
</style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Loading portfolio...</p>
  </div>

  <iframe id="portfolioFrame" title="Portfolio"></iframe>

  <script>
    (async function () {

      /* ── 1. shareId URL se nikalo ── */
      const shareId = window.location.pathname.split('/p/')[1]?.replace(/\/$/, '');

      if (!shareId) {
        showError('Invalid portfolio link.');
        return;
      }

      /* ── 2. Backend se portfolio data fetch karo ── */
      let portfolio;
      try {
        const res  = await fetch('https://folio-craft-two.vercel.app/api/public/p/' + shareId);
        const data = await res.json();

        if (!data.success || !data.portfolio) {
          showError('Portfolio not found or not published yet.');
          return;
        }
        portfolio = data.portfolio;
      } catch (e) {
        showError('Network error. Please check your connection.');
        return;
      }

      /* ── 3. Template path banao ── */
      const template = portfolio.selectedTemplate || 'modern-dark';
      const templatePath = '/templates/' + template + '/index.html';

      /* ── 4. iframe load karo ── */
      const frame = document.getElementById('portfolioFrame');
      frame.src   = templatePath;

      frame.addEventListener('load', function () {
        /* Exactly preview.js wala tarika — localStorage sync */
        try {
          frame.contentWindow.localStorage.setItem(
            'portfolioData',
            JSON.stringify(portfolio)
          );
        } catch (e) {
          console.warn('localStorage sync failed:', e.message);
        }

        /* postMessage backup bhi — preview.js ki tarah */
        try {
          frame.contentWindow.postMessage(
            { type: 'FOLIOCRAFT_DATA', payload: portfolio },
            '*'
          );
        } catch (e) {}

        /* Loader hide karo, iframe dikhao */
        document.getElementById('loader').style.display = 'none';
        frame.style.display = 'block';
      });

      frame.addEventListener('error', function () {
        showError('Template not found: ' + template);
      });

      function showError(msg) {
        document.getElementById('loader').innerHTML =
          '<p class="error">' + msg + '</p>';
      }
      function showError(msg) {
  document.getElementById('loader').innerHTML = `
    <div class="error">
      <div class="error-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="#ef4444" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <p class="error-title">Something went wrong</p>
      <p class="error-msg">${msg}</p>
    </div>
  `;
}

    })();
  </script>
</body>
</html>
