<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading Portfolio...</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { 
      background:#0f1623; color:#fff; 
      font-family:'Instrument Sans',system-ui,sans-serif;
      display:flex; align-items:center; justify-content:center; 
      min-height:100vh; 
    }
    .loader { text-align:center; }
    .spinner { 
      width:44px; height:44px; 
      border:3px solid rgba(123,110,246,0.2);
      border-top-color:#7b6ef6; 
      border-radius:50%;
      animation:spin 0.8s linear infinite; 
      margin:0 auto 16px; 
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { font-size:14px; color:rgba(255,255,255,0.5); }
    .error { color:#ef4444; font-size:14px; max-width:300px; line-height:1.6; }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Loading portfolio...</p>
  </div>

  <script>
    (async function() {
      // URL se shareId nikalo
      const path    = window.location.pathname;
      const shareId = path.replace('/p/', '').replace('/', '');

      if (!shareId || shareId === 'p.html') {
        document.getElementById('loader').innerHTML = 
          '<p class="error">Invalid portfolio link.</p>';
        return;
      }

      try {
        const res  = await fetch('https://folio-craft-two.vercel.app/api/public/p/' + shareId);
        const data = await res.json();

        if (!data.success || !data.portfolio) {
          document.getElementById('loader').innerHTML = 
            '<p class="error">Portfolio not found or not published yet.</p>';
          return;
        }

        // Data localStorage mein save karo
        localStorage.setItem('portfolioData',   JSON.stringify(data.portfolio));
        localStorage.setItem('selectedTemplate', data.portfolio.selectedTemplate || 'modern-dark');
        localStorage.setItem('isPublicView',     'true');

        // Preview pe redirect karo — root se
        window.location.href = '/preview.html';

      } catch(e) {
        document.getElementById('loader').innerHTML = 
          '<p class="error">Failed to load. Please check your connection.</p>';
      }
    })();
  </script>
</body>
</html>
